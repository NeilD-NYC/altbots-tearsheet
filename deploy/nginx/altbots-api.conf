server {
    server_name api.altbots.io;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /sse {
        proxy_pass http://127.0.0.1:8000/sse;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    add_header Access-Control-Allow-Origin 'https://demo.altbots.io' always;
    add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
    add_header Access-Control-Allow-Headers 'Content-Type, Authorization' always;

    location = /favicon.ico { return 204; }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.altbots.io/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.altbots.io/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = api.altbots.io) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name api.altbots.io;
    return 404; # managed by Certbot


}