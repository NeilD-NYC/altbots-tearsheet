# =============================================================================
# config/logrotate.conf — AltBots Tearsheet Project Log Rotation
#
# Called by run_weekly_sweep.sh at the start of each Sunday run via:
#   logrotate --state logs/.logrotate.state config/logrotate.conf
#
# Can also be installed system-wide for daily rotation:
#   sudo ln -s /root/tearsheet-project/config/logrotate.conf \
#              /etc/logrotate.d/altbots-tearsheet
#
# Rotation strategy:
#   weekly_sweep.log  — weekly, keep 8 (2 months of full sweep history)
#   cron_errors.log   — weekly, keep 12 (3 months, errors need longer retention)
#   cron.log          — monthly, keep 3 (raw cron stdout, high volume)
# =============================================================================

# Main sweep log — one file per run, keep 8 weeks
/root/tearsheet-project/logs/weekly_sweep.log {
    weekly
    rotate 8
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root root
    dateext
    dateformat -%Y%m%d
}

# Error log — longer retention, errors are valuable for post-mortems
/root/tearsheet-project/logs/cron_errors.log {
    weekly
    rotate 12
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root root
    dateext
    dateformat -%Y%m%d
}

# Raw cron stdout (from >> cron.log redirect in crontab)
/root/tearsheet-project/logs/cron.log {
    monthly
    rotate 3
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root root
}
